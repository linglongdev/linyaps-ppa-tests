name: Linyaps Matrix Compatibility Test

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Debian 系 ---
          - {
              name: "Debian 12",
              image: "debian:12",
              type: "apt",
              repo_slug: "Debian_12",
            }
          - {
              name: "Debian 13",
              image: "debian:13",
              type: "apt",
              repo_slug: "Debian_13",
            }
          # --- Ubuntu 系 ---
          - {
              name: "Ubuntu 24.04",
              image: "ubuntu:24.04",
              type: "apt",
              repo_slug: "xUbuntu_24.04",
            }
          - {
              name: "Ubuntu 25.04",
              image: "ubuntu:25.04",
              type: "apt",
              repo_slug: "Ubuntu_25.04",
            }
          - {
              name: "Ubuntu 25.10",
              image: "ubuntu:25.10",
              type: "apt",
              repo_slug: "Ubuntu_25.10",
            }
          # --- Deepin / UOS / openKylin ---
          - {
              name: "Deepin 23",
              image: "linuxdeepin/deepin:23",
              type: "apt",
              repo_slug: "Deepin_23",
            }
          - {
              name: "Deepin 25",
              image: "linuxdeepin/deepin:25",
              type: "apt",
              repo_slug: "Deepin_25",
            }
          - {
              name: "UOS 1070",
              image: "uniontech/uos:20",
              type: "apt",
              repo_slug: "uos_1070",
            }
          - {
              name: "openKylin 2.0",
              image: "openkylin/openkylin:2.0",
              type: "apt",
              repo_slug: "openkylin_2.0",
            }
          # --- Fedora 系 ---
          - {
              name: "Fedora 42",
              image: "fedora:42",
              type: "dnf",
              repo_slug: "Fedora_42",
            }
          - {
              name: "Fedora 43",
              image: "fedora:43",
              type: "dnf",
              repo_slug: "Fedora_43",
            }
          # --- openEuler 系 ---
          - {
              name: "openEuler 24.03",
              image: "openeuler/openeuler:24.03",
              type: "dnf",
              repo_slug: "openEuler_24.03",
            }
          - {
              name: "openEuler 25.03",
              image: "openeuler/openeuler:25.03",
              type: "dnf",
              repo_slug: "openEuler_25.03",
            }
          # --- AnolisOS ---
          - {
              name: "AnolisOS 23.3",
              image: "openanolis/anolisos:23.3",
              type: "dnf",
              repo_slug: "AnolisOS_23.3",
            }
          - {
              name: "AnolisOS 23.4",
              image: "openanolis/anolisos:23.4",
              type: "dnf",
              repo_slug: "AnolisOS_23.4",
            }
          # --- Arch Linux ---
          - {
              name: "Arch Linux",
              image: "archlinux:latest",
              type: "pacman",
              repo_slug: "arch",
            }

    container:
      image: ${{ matrix.image }}
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: 1. Setup Base Tools
        run: |
          case "${{ matrix.type }}" in
            "apt") apt-get update && apt-get install -y curl ca-certificates gnupg2 ;;
            "dnf") dnf install -y curl dnf-plugins-core ;;
            "pacman") pacman -Sy --noconfirm curl ;;
          esac

      - name: 2. Add Repository & Install
        run: |
          REPO_BASE="https://ppa.linyaps.org.cn/release"

          case "${{ matrix.type }}" in
            "apt")
              echo "deb [trusted=yes] $REPO_BASE/${{ matrix.repo_slug }}/ ./" > /etc/apt/sources.list.d/linglong.list
              apt-get update
              apt-get install -y linglong-bin linglong-builder
              ;;
            "dnf")
              dnf config-manager --add-repo "$REPO_BASE/${{ matrix.repo_slug }}/linglong%3ACI%3Arelease.repo"
              dnf install -y --nogpgcheck linglong-bin linglong-builder
              ;;
            "pacman")
              pacman -S --noconfirm linyaps
              ;;
          esac

      - name: 3. Verification
        run: |
          # 验证二进制是否存在
          command -v ll-cli
          ll-cli --version
